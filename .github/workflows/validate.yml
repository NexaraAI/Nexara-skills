name: Validate Skill PR

on:
  pull_request:
    paths:
      - "core/**"
      - "android/**"
      - "linux/**"
      - "windows/**"
      - "macos/**"
      - "manifest.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base dependencies
        run: |
          pip install httpx beautifulsoup4 lxml aiofiles psutil

      - name: AST safety scan
        run: python3 .github/scripts/ast_scan.py

      - name: Interface compliance check
        run: python3 .github/scripts/interface_check.py

      - name: Manifest integrity check
        run: python3 .github/scripts/manifest_check.py

      - name: Test imports
        run: python3 .github/scripts/test_imports.py

  update-manifest:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate manifest and checksums
        run: python3 .github/scripts/regenerate_manifest.py

      - name: Commit updated manifest
        run: |
          git config user.name  "nexara-bot"
          git config user.email "bot@nexara.dev"
          git add manifest.json checksums.sha256
          git diff --staged --quiet || git commit -m "chore: update manifest [skip ci]"
          git push
